# prometheus.yml
global:
  scrape_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: kafka_exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  - job_name: flink_jobmanager
    static_configs:
      - targets: ["flink-jobmanager:9249"]

  - job_name: flink_taskmanager
    static_configs:
      - targets: ["flink-taskmanager:9250"]